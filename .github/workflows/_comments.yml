name: "LBM: Comment Commands"

# Reusable workflow — called by target repos on issue_comment + pull_request_review_comment.
# Routes /merge, /feedback, and @agent repair mentions.

on:
  workflow_call:
    inputs:
      config-path:
        description: "Path to lbm.toml in the calling repo"
        required: false
        type: string
        default: "lbm.toml"
    secrets:
      LBM_APP_ID:
        required: false
      LBM_APP_PRIVATE_KEY:
        required: false
      PAT_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      PORTKEY_API_KEY:
        required: false
      PORTKEY_BEDROCK_SLUG:
        required: false


jobs:
  # -----------------------------------------------------------------------
  # /merge command — merge a selected agent's PR
  # -----------------------------------------------------------------------
  merge:
    if: >-
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/merge')
    runs-on: ubuntu-latest
    concurrency:
      group: merge-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='+1' 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Parse and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          # Parse alias text after /merge (e.g. "Swift Falcon")
          ALIAS_TEXT=$(python3 -c "
          import re, os
          comment = os.environ['COMMENT_BODY']
          m = re.match(r'/merge\s+(.+)', comment.strip().split('\n')[0])
          print(m.group(1).strip() if m else '')
          ")

          if [ -z "$ALIAS_TEXT" ]; then
            gh issue comment "$ISSUE_NUM" --body "Could not parse agent. Use: \`/merge <alias>\` (e.g. \`/merge Swift Falcon\`)"
            exit 0
          fi

          # Resolve alias to agent label via the issue's alias mapping
          AGENT_LABEL=$(python3 .lbm/scripts/agent_ops.py aliases resolve "$ISSUE_NUM" "$ALIAS_TEXT" 2>/dev/null || echo "")
          if [ -z "$AGENT_LABEL" ]; then
            gh issue comment "$ISSUE_NUM" --body "Unknown agent alias '$ALIAS_TEXT'. Check the status table for valid aliases."
            exit 0
          fi

          AGENT_NAME="$ALIAS_TEXT"
          BRANCH_PREFIX=$(python3 .lbm/scripts/agent_ops.py lookup label-to-name "$AGENT_LABEL" branch_prefix 2>/dev/null || echo "")

          # Find the agent's PR
          WINNER_PR=$(gh pr list --json number,body,headRefName,labels \
            --jq "[.[] | select(
              (.body | test(\"Implements #${ISSUE_NUM}\\\\b\")) and
              ((.headRefName | startswith(\"${BRANCH_PREFIX}\")) or (.labels | map(.name) | index(\"${AGENT_LABEL}\")))
            )] | last | .number // empty" 2>/dev/null || echo "")

          if [ -z "$WINNER_PR" ]; then
            gh issue comment "$ISSUE_NUM" --body "No ${AGENT_NAME} PR found for this issue."
            exit 0
          fi

          echo "Winner: ${AGENT_NAME} PR #${WINNER_PR}"

          # Check CI status
          CI_STATUS=$(gh pr checks "$WINNER_PR" 2>&1 | awk '
            BEGIN { pass=0; fail=0; pending=0; total=0 }
            /\tpass\t/  { pass++; total++ }
            /\tfail\t/  { fail++; total++ }
            /\tpending\t/ { pending++; total++ }
            END {
              if (total == 0) print "no-checks"
              else if (fail > 0) print "fail"
              else if (pending > 0) print "pending"
              else print "pass"
            }
          ')

          echo "CI status: $CI_STATUS"

          if [ "$CI_STATUS" = "pass" ]; then
            # Merge now
            gh pr ready "$WINNER_PR" || true
            sleep 5
            if gh pr merge "$WINNER_PR" --squash --delete-branch; then
              python3 .lbm/scripts/agent_ops.py close-losing-prs "$ISSUE_NUM" "$WINNER_PR" "$AGENT_NAME"
              gh issue close "$ISSUE_NUM" --comment "Merged ${AGENT_NAME} implementation (PR #${WINNER_PR})."
            else
              gh issue comment "$ISSUE_NUM" --body "Failed to merge PR #${WINNER_PR}. Check for merge conflicts."
            fi

          else
            # CI pending or failing -- mark for auto-merge when CI passes.
            gh label create merge-pending --color FBCA04 \
              --description "Auto-merge when CI passes" 2>/dev/null || true
            gh pr edit "$WINNER_PR" --add-label "merge-pending" || true
            if [ "$CI_STATUS" = "fail" ]; then
              gh issue comment "$ISSUE_NUM" --body "CI is failing on ${AGENT_NAME} PR #${WINNER_PR}. Agent will auto-repair. Will merge when CI passes."
            else
              gh issue comment "$ISSUE_NUM" --body "CI is still running on ${AGENT_NAME} PR #${WINNER_PR}. Will merge automatically when checks pass."
            fi
          fi

  # -----------------------------------------------------------------------
  # /no-winner command — close the iteration with no winning agent
  # -----------------------------------------------------------------------
  no-winner:
    if: >-
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/no-winner')
    runs-on: ubuntu-latest
    concurrency:
      group: no-winner-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='+1' 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Record no-winner verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          # Parse optional reason after /no-winner (e.g. "/no-winner none passed CI")
          REASON=$(python3 -c "
          import re, os
          comment = os.environ['COMMENT_BODY']
          m = re.match(r'/no-winner\s*(.*)', comment.strip().split('\n')[0])
          print(m.group(1).strip() if m else '')
          ")

          # Closes all agent PRs, posts the lbm:no-winner marker comment, labels the issue.
          python3 .lbm/scripts/agent_ops.py record-no-winner "$ISSUE_NUM" "$REASON"

          # Close the issue (the marker comment above is the durable record).
          gh issue close "$ISSUE_NUM" || true

  # -----------------------------------------------------------------------
  # /feedback command — parse feedback and post to agent's PR
  # -----------------------------------------------------------------------
  feedback:
    if: >-
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/feedback')
    runs-on: ubuntu-latest
    concurrency:
      group: agent-feedback-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='+1' 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Parse and post feedback to agent's PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAT_TOKEN: ${{ env.LBM_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          # Parse: /feedback <alias> <feedback text>
          # The alias is the first two words (adjective + animal), rest is feedback
          PARSE_RESULT=$(python3 -c "
          import re, os, json
          comment = os.environ['COMMENT_BODY'].strip()
          text = re.sub(r'^/feedback\s+', '', comment)
          parts = text.split(None, 2)
          if len(parts) >= 3:
              alias = parts[0] + ' ' + parts[1]
              feedback = parts[2]
          elif len(parts) == 2:
              alias = parts[0] + ' ' + parts[1]
              feedback = ''
          else:
              alias = text
              feedback = ''
          print(json.dumps({'alias': alias, 'feedback': feedback}))
          ")

          ALIAS_TEXT=$(echo "$PARSE_RESULT" | jq -r '.alias')
          FEEDBACK=$(echo "$PARSE_RESULT" | jq -r '.feedback')

          # Resolve alias to agent label
          AGENT_LABEL=$(python3 .lbm/scripts/agent_ops.py aliases resolve "$ISSUE_NUM" "$ALIAS_TEXT" 2>/dev/null || echo "")
          if [ -z "$AGENT_LABEL" ]; then
            gh issue comment "$ISSUE_NUM" --body "Could not identify agent '$ALIAS_TEXT'. Check the status table for valid aliases."
            exit 0
          fi

          AGENT_NAME="$ALIAS_TEXT"
          BRANCH_PREFIX=$(python3 .lbm/scripts/agent_ops.py lookup label-to-name "$AGENT_LABEL" branch_prefix 2>/dev/null || echo "")

          # Find the agent's PR
          PR_NUM=$(gh pr list --json number,body,headRefName,labels \
            --jq "[.[] | select(
              (.body | test(\"Implements #${ISSUE_NUM}\\\\b\")) and
              ((.headRefName | startswith(\"${BRANCH_PREFIX}\")) or (.labels | map(.name) | index(\"${AGENT_LABEL}\")))
            )] | last | .number // empty" 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --body "No ${AGENT_NAME} PR found for this issue."
            exit 0
          fi

          # Get @mention from config
          MENTION=$(python3 .lbm/scripts/agent_ops.py lookup label-to-name "$AGENT_LABEL" mention 2>/dev/null || echo "")

          # Build comment body with autonomous rules appended
          RULES="IMPORTANT: You are fully autonomous. Do NOT ask questions or seek approval. Pick the best approach and implement it. Always commit and push your changes."
          COMMENT_TEXT="${MENTION} ${FEEDBACK}

          ---
          ${RULES}"

          # Post feedback on the agent's PR using PAT so the event triggers other workflows
          if [ -n "$PAT_TOKEN" ]; then
            GH_TOKEN="$PAT_TOKEN" gh pr comment "$PR_NUM" --body "$COMMENT_TEXT"
          else
            gh pr comment "$PR_NUM" --body "$COMMENT_TEXT"
            echo "::warning::PAT_TOKEN not set -- feedback posted but agent may not pick it up automatically"
          fi

          gh issue comment "$ISSUE_NUM" --body "Feedback sent to ${AGENT_NAME} (PR #${PR_NUM})."

  # -----------------------------------------------------------------------
  # Codex repair — @codex mention on PR comments
  # -----------------------------------------------------------------------
  codex-repair:
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@codex') &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: codex-repair-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.issue.number }}"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
          echo "PR: $PR_NUM, Branch: $BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.branch != ''
        with:
          ref: ${{ steps.pr.outputs.branch }}

      - uses: actions/checkout@v4
        if: steps.pr.outputs.branch != ''
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Parse config
        if: steps.pr.outputs.branch != ''
        id: config
        env:
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_build_commands, get_agents
          cfg = load_config('${{ inputs.config-path }}')
          build = get_build_commands(cfg)
          codex_agent = next((a for a in get_agents(cfg) if a['harness'] == 'codex'), None)
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'runtime={build[\"runtime\"]}\n')
              f.write(f'install={build[\"install\"]}\n')
              if codex_agent:
                  f.write(f'model_id={codex_agent[\"model_id\"]}\n')
          "

      - uses: actions/setup-node@v4
        if: steps.pr.outputs.branch != '' && steps.config.outputs.runtime == 'node'
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        if: steps.pr.outputs.branch != '' && steps.config.outputs.runtime == 'python'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.pr.outputs.branch != '' && steps.config.outputs.install != ''
        run: ${{ steps.config.outputs.install }}

      - name: Build repair prompt
        if: steps.pr.outputs.branch != ''
        id: prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          INSTRUCTION=$(echo "$COMMENT_BODY" | sed 's/@codex[[:space:]]*//')
          AGENTS_MD=""
          # Try to read guidance file from config, fallback to AGENTS.md
          GUIDANCE=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config
          cfg = load_config('${{ inputs.config-path }}')
          print(cfg.get('lbm', {}).get('guidance_file', 'AGENTS.md'))
          " 2>/dev/null || echo "AGENTS.md")
          AGENTS_MD=$(cat "$GUIDANCE" 2>/dev/null || echo "")

          PROMPT_DELIM="PROMPT_$(uuidgen | tr -d '-')"
          echo "prompt<<${PROMPT_DELIM}" >> "$GITHUB_OUTPUT"
          echo "CRITICAL RULES: You are fully autonomous. NEVER ask questions, request clarification, or seek approval. Pick the best approach and implement it. Ship working code, don't start conversations. Always commit and push." >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$INSTRUCTION" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## Development Guide" >> "$GITHUB_OUTPUT"
          echo "${AGENTS_MD}" >> "$GITHUB_OUTPUT"
          echo "${PROMPT_DELIM}" >> "$GITHUB_OUTPUT"

      - name: Run Codex
        if: steps.pr.outputs.branch != ''
        uses: openai/codex-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ steps.config.outputs.model_id }}
          allow-bot-users: "lbm-bot"

      - name: Commit and push
        if: steps.pr.outputs.branch != ''
        env:
          GH_TOKEN: ${{ env.LBM_TOKEN }}
        run: |
          # Ensure workflow files match latest main
          git fetch origin main --quiet
          git checkout origin/main -- .github/workflows/ 2>/dev/null || true
          # Remove .lbm checkout from working tree
          rm -rf .lbm

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git add -A
            git commit -m "fix: apply repair from PR comment"
            git push
          fi

  # -----------------------------------------------------------------------
  # OpenHands repair — @openhands-agent mention on PR/issue comments
  # -----------------------------------------------------------------------
  openhands-repair:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest
    concurrency:
      group: openhands-repair-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Resolve issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.issue.number }}"
          ISSUE_NUM=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json body --jq '.body' 2>/dev/null | grep -oP 'Implements #\K\d+' || echo "$PR_NUM")
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenHands
        run: pip install openhands-ai 2>&1 | tail -3

      - name: Parse config for LLM settings
        id: config
        env:
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_agents
          cfg = load_config('${{ inputs.config-path }}')
          agents = get_agents(cfg)
          # Find first openhands agent
          for a in agents:
              if a['harness'] == 'openhands':
                  with open('$GITHUB_OUTPUT', 'a') as f:
                      f.write(f'model_id={a[\"model_id\"]}\n')
                      f.write(f'branch_prefix={a[\"branch_prefix\"]}\n')
                      f.write(f'agent_label={a[\"label\"]}\n')
                  break
          "

      - name: Resolve issue
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ steps.config.outputs.model_id }}
        run: |
          echo "LLM_MODEL=$LLM_MODEL"
          python -m openhands.resolver.resolve_issue \
            --selected-repo "${{ github.repository }}" \
            --issue-number "$ISSUE_NUM" \
            --token "$GITHUB_TOKEN" \
            --username "github-actions[bot]" \
            --llm-model "$LLM_MODEL" \
            --llm-api-key "$LLM_API_KEY" \
            --max-iterations 30 \
            --output-dir /tmp/oh-output \
            --runtime docker \
            2>&1 | tee /tmp/oh-resolve.log || true

      - name: Apply patch and push
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ env.LBM_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          if [ ! -f /tmp/oh-output/output.jsonl ]; then
            echo "No resolver output found"
            exit 0
          fi

          PATCH=$(python3 -c "
          import json
          with open('/tmp/oh-output/output.jsonl') as f:
              for line in f:
                  data = json.loads(line)
                  if data.get('git_patch'):
                      print(data['git_patch'])
                      break
          " 2>/dev/null || echo "")

          if [ -z "$PATCH" ]; then
            echo "No patch in resolver output"
            exit 0
          fi

          # Get the PR branch and apply patch
          PR_NUM="${{ github.event.issue.number }}"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")

          if [ -n "$BRANCH" ]; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          fi

          # Apply patch with fallback methods
          if echo "$PATCH" | git apply --allow-empty 2>/dev/null; then
            echo "Patch applied cleanly"
          elif echo "$PATCH" | git apply --3way 2>/dev/null; then
            echo "Patch applied with 3-way merge"
          elif echo "$PATCH" | git apply --reject 2>/dev/null; then
            echo "::warning::Patch applied with rejections"
            find . -name "*.rej" -exec rm {} \;
          else
            echo "::error::All patch methods failed"
            exit 0
          fi

          # Ensure workflow files match latest main
          git fetch origin main --quiet
          git checkout origin/main -- .github/workflows/ 2>/dev/null || true
          rm -rf .lbm

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if [ -n "$PAT_TOKEN" ]; then
              git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
              git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git"
            fi
            git add -A
            git commit -m "fix: apply repair from PR comment"
            git push
          fi
