name: "LBM: CI Hooks (Self-Heal + Preview + Deploy)"

# Reusable workflow — called by target repos on workflow_run + deployment_status + pull_request(closed).
# Handles CI failure repair, auto-merge, deploy failure repair, preview link posting, and cleanup.

on:
  workflow_call:
    inputs:
      config-path:
        description: "Path to lbm.toml in the calling repo"
        required: false
        type: string
        default: "lbm.toml"
    secrets:
      LBM_APP_ID:
        required: false
      LBM_APP_PRIVATE_KEY:
        required: false
      PAT_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      PORTKEY_API_KEY:
        required: false
      PORTKEY_BEDROCK_SLUG:
        required: false
      FLY_API_TOKEN:
        required: false
      VERCEL_TOKEN:
        required: false
      LLM_API_KEY:
        required: false
      EMBEDDING_API_KEY:
        required: false


jobs:
  # -----------------------------------------------------------------------
  # CI failure — dispatch repair to the agent that owns the PR
  # -----------------------------------------------------------------------
  ci-failure:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Dispatch repair for CI failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ env.LBM_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN_ID="${{ github.event.workflow_run.id }}"

          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ]; then
            echo "No PR for branch $BRANCH"
            exit 0
          fi

          # Collect errors from ALL CI steps
          FAILURE_LOG=$(gh run view "$RUN_ID" --log 2>&1 | grep -E "##\[error\]|error TS|Error:|error " | grep -v "##\[error\]Process completed" | head -30 || echo "Could not fetch log")

          # Also note which steps passed/failed
          STEP_SUMMARY=$(gh run view "$RUN_ID" --json jobs --jq '.jobs[].steps[] | select(.conclusion != "skipped") | "\(.name): \(.conclusion)"' 2>/dev/null || echo "")

          python3 .lbm/scripts/agent_ops.py dispatch-repair "$PR_NUM" "CI failed. Fix ALL errors before pushing -- CI has multiple steps (lint, typecheck, build) and all must pass.

          Step results:
          \`\`\`
          ${STEP_SUMMARY}
          \`\`\`

          Errors found:
          \`\`\`
          ${FAILURE_LOG}
          \`\`\`"

  # -----------------------------------------------------------------------
  # Auto-merge — when CI passes on merge-pending PRs
  # -----------------------------------------------------------------------
  auto-merge:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Merge pending PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          PR_NUM=$(gh pr list --head "$BRANCH" --json number,labels \
            --jq '.[0] | select(.labels | map(.name) | index("merge-pending")) | .number // empty' 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ]; then
            echo "No merge-pending PR on branch $BRANCH"
            exit 0
          fi

          echo "Merging PR #$PR_NUM..."

          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body' 2>/dev/null || echo "")
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Implements #\K\d+' || echo "")

          # Resolve display name: alias if available, else legacy agent name
          AGENT_LABEL=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" label 2>/dev/null || echo "")
          AGENT_NAME=$(python3 -c "
          import sys, os
          sys.path.insert(0, '.lbm/scripts')
          from agent_ops import read_alias_mapping, reverse_alias_mapping
          issue = '$ISSUE_NUM'
          label = '$AGENT_LABEL'
          if issue and label:
              mapping = read_alias_mapping(issue)
              if mapping:
                  rev = reverse_alias_mapping(mapping)
                  name = rev.get(label)
                  if name:
                      print(name)
                      sys.exit(0)
          " 2>/dev/null || echo "")
          if [ -z "$AGENT_NAME" ]; then
            AGENT_NAME=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" name 2>/dev/null || echo "Agent")
          fi

          gh pr edit "$PR_NUM" --remove-label "merge-pending" || true
          gh pr ready "$PR_NUM" || true
          sleep 5

          if gh pr merge "$PR_NUM" --squash --delete-branch; then
            if [ -n "$ISSUE_NUM" ]; then
              python3 .lbm/scripts/agent_ops.py close-losing-prs "$ISSUE_NUM" "$PR_NUM" "$AGENT_NAME"
              gh issue close "$ISSUE_NUM" --comment "Merged ${AGENT_NAME} implementation (PR #${PR_NUM})."
            fi
          else
            gh pr edit "$PR_NUM" --add-label "merge-pending" || true
          fi

  # -----------------------------------------------------------------------
  # Plan finalize (plan step) — a plan PR selected WITH feedback carries the
  # lbm:plan-finalize label. Once the agent pushes its one revision and CI
  # passes, auto-finalize the merge (merge plan -> flip to implement -> dispatch)
  # so `/merge-plan <alias> <feedback>` needs no manual finalize step.
  # -----------------------------------------------------------------------
  plan-finalize:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Finalize selected plan
        # Use the LBM token so finalize's re-applied ready label re-fires
        # issues.labeled and dispatches the implement phase (GITHUB_TOKEN wouldn't).
        env:
          GH_TOKEN: ${{ env.LBM_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAT_TOKEN: ${{ env.LBM_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUM=$(gh pr list --head "$BRANCH" --json number,labels \
            --jq '.[0] | select(.labels | map(.name) | index("lbm:plan-finalize")) | .number // empty' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ]; then
            echo "No lbm:plan-finalize PR on branch $BRANCH; nothing to finalize."
            exit 0
          fi

          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body' 2>/dev/null || echo "")
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Implements #\K\d+' | head -n1 || echo "")
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' | head -n1 || echo "")
          fi
          AGENT_LABEL=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" label 2>/dev/null || echo "")
          if [ -z "$ISSUE_NUM" ] || [ -z "$AGENT_LABEL" ]; then
            echo "Could not resolve issue ($ISSUE_NUM) / agent ($AGENT_LABEL) for PR #$PR_NUM; skipping."
            exit 0
          fi

          echo "Auto-finalizing plan PR #$PR_NUM (issue #$ISSUE_NUM, $AGENT_LABEL) after revision."
          python3 .lbm/scripts/agent_ops.py merge-plan "$ISSUE_NUM" "$AGENT_LABEL"

  # -----------------------------------------------------------------------
  # Deploy (active platforms) — build + deploy on CI success
  # -----------------------------------------------------------------------
  deploy-active:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Check if active deploy platform and agent branch
        id: check
        env:
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_ACTIVE=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, is_active_deploy_platform
          cfg = load_config('${{ inputs.config-path }}')
          print('true' if is_active_deploy_platform(cfg) else 'false')
          ")
          echo "is_active=$IS_ACTIVE" >> "$GITHUB_OUTPUT"

          if [ "$IS_ACTIVE" = "false" ]; then
            echo "Not an active deploy platform, skipping"
            exit 0
          fi

          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUM" ]; then
            echo "No PR for branch $BRANCH"
            exit 0
          fi

          # Check if this is an agent branch
          AGENT_INFO=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" 2>/dev/null || echo "")
          if [ -z "$AGENT_INFO" ]; then
            echo "Not an agent branch: $BRANCH"
            echo "is_agent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "is_agent=true" >> "$GITHUB_OUTPUT"

          # Get issue number from PR body
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body' 2>/dev/null || echo "")
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Implements #\K\d+' || echo "")
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Deploy to Fly.io
        if: steps.check.outputs.is_active == 'true' && steps.check.outputs.is_agent == 'true' && steps.check.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ env.LBM_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR_NUM="${{ steps.check.outputs.pr_number }}"
          BRANCH="${{ steps.check.outputs.branch }}"
          ISSUE_NUM="${{ steps.check.outputs.issue_number }}"

          # Read deploy config
          APP_PREFIX=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_deploy_config
          cfg = load_config('${{ inputs.config-path }}')
          dc = get_deploy_config(cfg)
          print(dc['app_prefix'])
          ")
          REGION=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_deploy_config
          cfg = load_config('${{ inputs.config-path }}')
          dc = get_deploy_config(cfg)
          print(dc['region'])
          ")

          APP_NAME="${APP_PREFIX}-${PR_NUM}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}:pr-${PR_NUM}"

          echo "Building and pushing image ${IMAGE}..."

          # Build and push image to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build --target production -t "$IMAGE" .
          docker push "$IMAGE"

          # Install flyctl
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"

          # Create app if it doesn't exist
          if ! flyctl apps list --json | grep -q "\"$APP_NAME\""; then
            flyctl apps create "$APP_NAME" --org personal
          fi

          # Deploy
          flyctl deploy \
            --app "$APP_NAME" \
            --image "$IMAGE" \
            --primary-region "$REGION" \
            --ha=false \
            --vm-size shared-cpu-2x \
            --vm-memory 1024 \
            --env BACKEND_PORT=8001 \
            --env FRONTEND_PORT=3782 \
            2>&1 | tee /tmp/deploy.log

          DEPLOY_EXIT=$?
          if [ $DEPLOY_EXIT -ne 0 ]; then
            LOGS=$(tail -50 /tmp/deploy.log)
            python3 .lbm/scripts/agent_ops.py dispatch-repair "$PR_NUM" \
              "Deployment to Fly.io failed. Deploy logs:
          \`\`\`
          ${LOGS}
          \`\`\`"
            exit 1
          fi

          # Set secrets on the app
          flyctl secrets set --app "$APP_NAME" \
            LLM_API_KEY="${{ secrets.LLM_API_KEY }}" \
            EMBEDDING_API_KEY="${{ secrets.EMBEDDING_API_KEY }}" \
            2>/dev/null || true

          PREVIEW_URL="https://${APP_NAME}.fly.dev"
          echo "Preview deployed: $PREVIEW_URL"

          # Report preview URL
          if [ -n "$ISSUE_NUM" ]; then
            AGENT_INFO=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" 2>/dev/null || echo "")
            if [ -n "$AGENT_INFO" ]; then
              AGENT_LABEL=$(echo "$AGENT_INFO" | grep "^label=" | cut -d= -f2)
              python3 .lbm/scripts/agent_ops.py update-status \
                "$ISSUE_NUM" "$AGENT_LABEL" "preview" "$PR_NUM" "$PREVIEW_URL" || true
            fi
          fi

  # -----------------------------------------------------------------------
  # Cleanup — destroy preview on PR close (active platforms only)
  # -----------------------------------------------------------------------
  cleanup:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Check if active deploy and agent branch
        id: check
        run: |
          IS_ACTIVE=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, is_active_deploy_platform
          cfg = load_config('${{ inputs.config-path }}')
          print('true' if is_active_deploy_platform(cfg) else 'false')
          ")
          echo "is_active=$IS_ACTIVE" >> "$GITHUB_OUTPUT"

          BRANCH="${{ github.event.pull_request.head.ref }}"
          AGENT_INFO=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" 2>/dev/null || echo "")
          if [ -z "$AGENT_INFO" ]; then
            echo "is_agent=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_agent=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Destroy Fly preview
        if: steps.check.outputs.is_active == 'true' && steps.check.outputs.is_agent == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          APP_PREFIX=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_deploy_config
          cfg = load_config('${{ inputs.config-path }}')
          dc = get_deploy_config(cfg)
          print(dc['app_prefix'])
          ")

          APP_NAME="${APP_PREFIX}-${{ github.event.pull_request.number }}"

          # Install flyctl
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"

          flyctl apps destroy "$APP_NAME" --yes 2>/dev/null || echo "App $APP_NAME not found"

  # -----------------------------------------------------------------------
  # Deploy failure — dispatch repair for Vercel/deploy failures
  # -----------------------------------------------------------------------
  deploy-failure:
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'failure' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Dispatch repair for deploy failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ env.LBM_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          DEPLOY_SHA="${{ github.event.deployment.sha }}"

          # Find the PR for this deployment
          PR_NUM=$(gh api "repos/${{ github.repository }}/pulls" \
            --jq "[.[] | select(.head.sha == \"${DEPLOY_SHA}\")] | .[0].number // empty" 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ]; then
            echo "No open PR found for SHA $DEPLOY_SHA"
            exit 0
          fi

          BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")

          # Check if this is an agent branch
          AGENT_INFO=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" 2>/dev/null || echo "")
          if [ -z "$AGENT_INFO" ]; then
            echo "Not an agent branch: $BRANCH"
            exit 0
          fi

          # Read deploy platform from config
          DEPLOY_PLATFORM=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_deploy_platform
          cfg = load_config('${{ inputs.config-path }}')
          print(get_deploy_platform(cfg))
          ")

          # Fetch deploy logs (Vercel-specific). LOGS_AVAILABLE distinguishes
          # "we have real build output" from "we only have a URL" — the prompt
          # we send to the agent must not pretend the latter is the former.
          LOG_URL="${{ github.event.deployment_status.log_url }}"
          TARGET_URL="${{ github.event.deployment_status.target_url }}"
          DEPLOY_LOGS=""
          LOGS_AVAILABLE=false
          LOGS_REASON=""

          if [ "$DEPLOY_PLATFORM" = "vercel" ]; then
            if [ -z "$VERCEL_TOKEN" ]; then
              LOGS_REASON="VERCEL_TOKEN secret is not configured on this repository, so build logs cannot be fetched from the Vercel API."
            else
              DEPLOY_HOST="${{ github.event.deployment_status.environment_url }}"
              DEPLOY_HOST="${DEPLOY_HOST#https://}"
              if [ -n "$DEPLOY_HOST" ]; then
                DPL_UID=$(curl -sf "https://api.vercel.com/v13/deployments/get?url=${DEPLOY_HOST}" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
                if [ -n "$DPL_UID" ]; then
                  echo "Fetching logs for deployment $DPL_UID..."
                  DEPLOY_LOGS=$(npx --yes vercel inspect "$DPL_UID" --logs --token="$VERCEL_TOKEN" 2>&1 | tail -100 || echo "")
                  if [ -n "$DEPLOY_LOGS" ]; then
                    LOGS_AVAILABLE=true
                  else
                    LOGS_REASON="Vercel CLI returned no log output for deployment $DPL_UID."
                  fi
                else
                  LOGS_REASON="Could not resolve deployment ID for host $DEPLOY_HOST via the Vercel API."
                fi
              else
                LOGS_REASON="No environment_url on the deployment_status event."
              fi
            fi
          else
            LOGS_REASON="Deploy platform '$DEPLOY_PLATFORM' has no log fetcher wired up."
          fi

          # If we have logs, scan for missing-env-var signatures so the prompt
          # can name the offender directly instead of hinting generically.
          MISSING_ENV_VARS=""
          if [ "$LOGS_AVAILABLE" = "true" ]; then
            MISSING_ENV_VARS=$(python3 - "$DEPLOY_LOGS" <<'PYEOF'
          import re, sys
          logs = sys.argv[1]
          patterns = [
              r'Environment Variable "([A-Z_][A-Z0-9_]+)" references Secret',
              r'Invalid environment variables:\s*\{\s*([A-Z_][A-Z0-9_]+)',
              r'process\.env\.([A-Z_][A-Z0-9_]+) is (?:required|undefined|not defined)',
              r'Missing (?:required )?environment variable[: ]+([A-Z_][A-Z0-9_]+)',
              r'Missing ([A-Z_][A-Z0-9_]+) environment variable',
              r'([A-Z_][A-Z0-9_]+) is required but (?:not set|undefined|missing)',
              r'Missing CLERK_(SECRET|PUBLISHABLE)_KEY',
          ]
          found = []
          for pat in patterns:
              for m in re.finditer(pat, logs):
                  name = m.group(1)
                  if name in ("SECRET", "PUBLISHABLE"):
                      name = f"CLERK_{name}_KEY"
                  if name not in found:
                      found.append(name)
          # Clerk's "Missing publishable key" is its own signature
          if "Missing publishable key" in logs and "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" not in found:
              found.append("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY")
          print(",".join(found))
          PYEOF
            )
          fi

          # Build the failure context. Three branches: (a) no logs, (b) logs +
          # named missing env var, (c) logs but no env-var signature.
          if [ "$LOGS_AVAILABLE" = "false" ]; then
            REPAIR_CONTEXT="Deployment failed (CI passed but deploy did not), and build logs could not be fetched.

          Reason logs are unavailable: ${LOGS_REASON}

          Failed deployment URL: ${LOG_URL:-$TARGET_URL}

          Without logs there is no diagnostic evidence to act on. Do NOT guess at causes. Inspect the most recent commit's diff for changes that could plausibly affect the deploy build (new dependencies, new server-side imports, new database/auth wiring, build script changes), and report what you see — only push a fix if there is concrete evidence in the diff. Otherwise comment on the PR explaining that diagnosis requires deploy logs."
          elif [ -n "$MISSING_ENV_VARS" ]; then
            REPAIR_CONTEXT="Deployment failed because the following environment variable(s) are not configured on the deploy platform: ${MISSING_ENV_VARS}.

          This is most likely a deploy-platform configuration issue, not a code issue — the variable needs to be set in the Vercel project (Settings → Environment Variables). Only change code if the variable should not have been required (e.g., add a runtime-time guard for placeholder/missing values).

          Build logs (last 100 lines):
          \`\`\`
          ${DEPLOY_LOGS}
          \`\`\`"
          else
            REPAIR_CONTEXT="Deployment failed (CI passed but deploy did not). Diagnose from the build logs below — do not guess.

          Build logs (last 100 lines):
          \`\`\`
          ${DEPLOY_LOGS}
          \`\`\`"
          fi

          python3 .lbm/scripts/agent_ops.py dispatch-repair "$PR_NUM" "$REPAIR_CONTEXT"

  # -----------------------------------------------------------------------
  # Post preview link + summary on successful deploy
  # -----------------------------------------------------------------------
  post-preview:
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Find PR and post preview + summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          PREVIEW_URL="${{ github.event.deployment_status.environment_url }}"
          DEPLOY_SHA="${{ github.event.deployment.sha }}"

          # Find the PR for this deployment SHA
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls" \
            --jq "[.[] | select(.head.sha == \"${DEPLOY_SHA}\")] | .[0]" 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No open PR found for SHA $DEPLOY_SHA"
            exit 0
          fi

          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
          BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')

          # Look up agent from branch prefix
          AGENT_INFO=$(python3 .lbm/scripts/agent_ops.py lookup branch-to-name "$BRANCH" 2>/dev/null || echo "")
          if [ -z "$AGENT_INFO" ]; then
            echo "Not an agent branch: $BRANCH"
            exit 0
          fi

          AGENT_LABEL=$(echo "$AGENT_INFO" | grep "^label=" | cut -d= -f2)

          # Extract issue number from PR body
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Implements #\K\d+' || echo "")
          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found"
            exit 0
          fi

          # Resolve alias for display name
          AGENT=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from agent_ops import read_alias_mapping, reverse_alias_mapping
          mapping = read_alias_mapping('$ISSUE_NUM')
          if mapping:
              rev = reverse_alias_mapping(mapping)
              name = rev.get('$AGENT_LABEL')
              if name:
                  print(name)
                  sys.exit(0)
          " 2>/dev/null || echo "")
          if [ -z "$AGENT" ]; then
            AGENT=$(echo "$AGENT_INFO" | grep "^name=" | cut -d= -f2)
          fi
          echo "Branch $BRANCH -> $AGENT (PR #$PR_NUM)"

          # Generate summary
          echo "Generating summary for PR #$PR_NUM..."
          SUMMARY=$(python3 .lbm/scripts/agent_ops.py summarize-pr "$PR_NUM" "$ISSUE_NUM" 2>&1) || true
          if [ -n "$SUMMARY" ]; then
            echo "Summary generated (${#SUMMARY} chars)"
          else
            echo "Warning: summary generation returned empty"
          fi

          # Build comment
          BODY="## ${AGENT} Implementation
          - **PR**: #${PR_NUM}
          - **Preview**: ${PREVIEW_URL}"

          if [ -n "$SUMMARY" ]; then
            BODY="${BODY}

          ${SUMMARY}"
          fi

          BODY="${BODY}

          ---
          *Review and compare agent implementations, then merge the best one.*"

          # Find and update existing comment, or post new one
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments" \
            --jq "[.[] | select(.body | startswith(\"## ${AGENT}\")) | select(.body | contains(\"#${PR_NUM}\"))] | last | .id // empty" 2>/dev/null || echo "")

          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -f body="$BODY"
          else
            gh issue comment "$ISSUE_NUM" --body "$BODY"
          fi

          # Also update the status table with the preview link
          AGENT_LABEL=$(echo "$AGENT_INFO" | grep "^label=" | cut -d= -f2)
          python3 .lbm/scripts/agent_ops.py update-status "$ISSUE_NUM" "$AGENT_LABEL" "preview" "$PR_NUM" "$PREVIEW_URL" || true
