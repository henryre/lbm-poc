name: "LBM: Dispatch + Cleanup"

# Reusable workflow — called by target repos on issues.labeled / issues.closed.
# Posts a status table, dispatches non-Claude agents, and cleans up on close.

on:
  workflow_call:
    inputs:
      config-path:
        description: "Path to lbm.toml in the calling repo"
        required: false
        type: string
        default: "lbm.toml"
    secrets:
      LBM_APP_ID:
        required: false
      LBM_APP_PRIVATE_KEY:
        required: false
      PAT_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      PORTKEY_API_KEY:
        required: false
      PORTKEY_BEDROCK_SLUG:
        required: false


jobs:
  # -----------------------------------------------------------------------
  # Router: on issues.labeled with the configured ready_label
  # -----------------------------------------------------------------------
  router:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Parse config
        id: config
        env:
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          # Read the ready_label from config
          READY_LABEL=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config
          cfg = load_config('${{ inputs.config-path }}')
          print(cfg.get('lbm', {}).get('ready_label', 'ready-for-dev'))
          ")
          echo "ready_label=$READY_LABEL" >> "$GITHUB_OUTPUT"

          # Check if the applied label matches the ready_label
          if [ "${{ github.event.label.name }}" != "$READY_LABEL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check token availability
        if: steps.config.outputs.skip == 'false'
        run: |
          if [ -z "$LBM_TOKEN" ]; then
            echo "::warning::Neither LBM App secrets nor PAT_TOKEN configured"
          fi

      - name: Preflight checks
        if: steps.config.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY && 'true' || 'false' }}
          HAS_PORTKEY: ${{ secrets.PORTKEY_API_KEY && 'true' || 'false' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY && 'true' || 'false' }}
          HAS_GEMINI: ${{ secrets.GEMINI_API_KEY && 'true' || 'false' }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          WARNINGS=""

          # Check per-harness secrets
          MISSING_SECRETS=$(python3 -c "
          import sys, os
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_agents
          cfg = load_config('${{ inputs.config-path }}')
          agents = get_agents(cfg)
          seen = set()
          for a in agents:
              h = a['harness']
              if h in seen:
                  continue
              seen.add(h)
              if h == 'claude':
                  if os.environ.get('HAS_ANTHROPIC') != 'true' and os.environ.get('HAS_PORTKEY') != 'true':
                      print('ANTHROPIC_API_KEY or PORTKEY_API_KEY (for claude)')
              elif h == 'codex':
                  if os.environ.get('HAS_OPENAI') != 'true':
                      print('OPENAI_API_KEY (for codex)')
              elif h == 'openhands':
                  if os.environ.get('HAS_GEMINI') != 'true':
                      print('GEMINI_API_KEY (for openhands)')
          ")
          while IFS= read -r SECRET; do
            [ -n "$SECRET" ] && WARNINGS="${WARNINGS}\n- **${SECRET}** secret missing — that agent will fail"
          done <<< "$MISSING_SECRETS"

          # Check Actions workflow permissions (requires admin scope on PAT_TOKEN)
          # Only warn on definitive responses; skip silently on API errors
          WORKFLOW_PERMS=$(gh api "repos/${{ github.repository }}/actions/permissions/workflow" --jq '.default_workflow_permissions' 2>/dev/null || echo "")
          if [ "$WORKFLOW_PERMS" = "read" ]; then
            WARNINGS="${WARNINGS}\n- **Workflow permissions** are read-only — set to Read+Write in Settings → Actions → General"
          fi
          CAN_CREATE_PR=$(gh api "repos/${{ github.repository }}/actions/permissions/workflow" --jq '.can_approve_pull_request_reviews' 2>/dev/null || echo "")
          if [ "$CAN_CREATE_PR" = "false" ]; then
            WARNINGS="${WARNINGS}\n- **Allow GitHub Actions to create PRs** is disabled — enable in Settings → Actions → General"
          fi

          # Post warnings if any
          if [ -n "$WARNINGS" ]; then
            BODY=$(printf "⚠️ **LBM preflight warnings:**\n${WARNINGS}\n\nAgents will still be dispatched, but affected agents may fail.")
            gh issue comment "$ISSUE_NUM" --body "$BODY"
          fi

      - name: Generate aliases and post status table
        if: steps.config.outputs.skip == 'false'
        id: aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          # Resolve phase (plan vs implement) from durable issue labels, then
          # choose the table header/column. On the implement-phase re-fire (after
          # /merge-plan), this posts the ## Agent Implementations table.
          LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          PHASE=$(python3 -c "
          import sys, os
          sys.path.insert(0, '.lbm/scripts')
          import config_parser
          cfg = config_parser.load_config('${{ inputs.config-path }}')
          labels = [x for x in '''$LABELS'''.split(',') if x]
          print(config_parser.resolve_phase(cfg, labels))
          ")
          if [ "$PHASE" = "plan" ]; then
            HEADER="## Agent Plans"; COL="Plan"
          else
            HEADER="## Agent Implementations"; COL="Preview"
          fi

          # Check if aliases already exist (lock: don't regenerate on retag)
          EXISTING=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from agent_ops import read_alias_mapping
          import json
          m = read_alias_mapping('$ISSUE_NUM')
          print(json.dumps(m) if m else '')
          ")

          if [ -n "$EXISTING" ]; then
            echo "Aliases already locked for issue #$ISSUE_NUM"
            ALIAS_JSON="$EXISTING"
          else
            # Generate new aliases
            ALIAS_JSON=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from agent_ops import load_agents, generate_aliases
          import json
          agents = load_agents()
          mapping = generate_aliases(agents)
          print(json.dumps(mapping))
          ")
          fi

          # Encode for embedding
          ENCODED=$(python3 -c "
          import sys, json
          sys.path.insert(0, '.lbm/scripts')
          from agent_ops import encode_alias_mapping
          mapping = json.loads('$ALIAS_JSON')
          print(encode_alias_mapping(mapping))
          ")

          # Build status table rows using aliases
          STATUS=$(python3 -c "
          import sys, json
          sys.path.insert(0, '.lbm/scripts')
          mapping = json.loads('$ALIAS_JSON')
          for alias in mapping:
              print(f'| {alias} | ⏳ Running... |  |  |  |')
          ")

          # Idempotent: don't repost a table that already exists for this phase
          # (guards the implement-phase re-fire and any label re-application).
          EXISTS=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
            --jq "[.[] | select(.body | startswith(\"$HEADER\"))] | length" 2>/dev/null || echo "0")

          if [ "$EXISTS" = "0" ]; then
            gh issue comment "$ISSUE_NUM" --body "$HEADER

          | Agent | Status | PR | ${COL} | Run |
          |-------|--------|-----|---------|-----|
          ${STATUS}

          ---
          *Agents are working on this issue. This comment will be updated as each completes.*
          <!-- lbm:aliases:${ENCODED} -->"
          else
            echo "Status table '$HEADER' already exists for issue #$ISSUE_NUM; skipping."
          fi

      - name: Dispatch agents
        if: steps.config.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ env.LBM_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          # Get list of non-Claude harnesses to dispatch via workflow_dispatch.
          # Claude is triggered by the issues.labeled event directly (handled by
          # the caller workflow routing to _agent-claude.yml).
          python3 -c "
          import sys, json
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_agents
          cfg = load_config('${{ inputs.config-path }}')
          agents = get_agents(cfg)
          seen = set()
          for a in agents:
              h = a['harness']
              if h != 'claude' and h not in seen:
                  seen.add(h)
                  # Each agent entry gets its own dispatch with harness identifier
                  print(json.dumps({'harness': h, 'label': a['label']}))
          " | while read -r AGENT_JSON; do
            HARNESS=$(echo "$AGENT_JSON" | jq -r '.harness')
            LABEL=$(echo "$AGENT_JSON" | jq -r '.label')

            echo "Dispatching lbm-agents.yml for $HARNESS (issue #$ISSUE_NUM)..."
            gh workflow run "lbm-agents.yml" \
              -f issue_number="$ISSUE_NUM" \
              -f agent="$HARNESS" || echo "Warning: failed to dispatch $HARNESS"
          done

  # -----------------------------------------------------------------------
  # Cleanup: on issues.closed — close all agent PRs for the issue
  # -----------------------------------------------------------------------
  cleanup:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Generate LBM App token
        id: gen-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.LBM_APP_ID }}
          private-key: ${{ secrets.LBM_APP_PRIVATE_KEY }}

      - name: Set LBM token
        run: |
          if [ -n "${{ steps.gen-token.outputs.token }}" ]; then
            echo "LBM_TOKEN=${{ steps.gen-token.outputs.token }}" >> $GITHUB_ENV
          else
            echo "LBM_TOKEN=${{ secrets.PAT_TOKEN }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: henryre/lbm-poc
          path: .lbm
          token: ${{ env.LBM_TOKEN }}

      - name: Close all agent PRs for this issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LBM_CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          # Load all branch prefixes from config
          PREFIXES=$(python3 -c "
          import sys
          sys.path.insert(0, '.lbm/scripts')
          from config_parser import load_config, get_agents
          cfg = load_config('${{ inputs.config-path }}')
          for a in get_agents(cfg):
              print(a['branch_prefix'])
          ")

          # Find and close any open agent PRs for this issue
          gh pr list --json number,body,headRefName,state \
            --jq ".[] | select(.body | test(\"Implements #${ISSUE_NUM}\\\\b\")) | {number, branch: .headRefName}" 2>/dev/null | jq -r '.number, .branch' | while read PR_NUM && read BRANCH; do
            # Check if branch matches any agent prefix
            IS_AGENT=false
            for PREFIX in $PREFIXES; do
              if echo "$BRANCH" | grep -qi "^${PREFIX}"; then
                IS_AGENT=true
                break
              fi
            done

            if [ "$IS_AGENT" = "true" ]; then
              echo "Closing agent PR #$PR_NUM ($BRANCH)"
              gh pr close "$PR_NUM" --comment "Closed: issue #${ISSUE_NUM} was closed." --delete-branch || true
            fi
          done
